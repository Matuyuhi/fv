name: Bump version

# Cargo.toml の version を patch / minor / major のいずれかで上げ、main へ push する。
# push が release.yml の guard を通過してリリースが走る。
#
# 重要: GITHUB_TOKEN で push しても他ワークフローは起動しない（GitHub 制約）。
# そのため push には PAT が必要。
# 前提シークレット: BUMP_TOKEN
#   Matuyuhi/fv の Contents=R/W 権を持つ fine-grained PAT。
#   未設定なら push をスキップし、手動で bump コミットをプッシュする旨を案内する。

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute next version
        id: ver
        run: |
          # [package] セクション内の version 行だけを読む（依存の version 行を誤読しない）
          current="$(awk '/^\[package\]/,/^\[/{if (/^version[[:space:]]*=/) {match($0, /"([^"]+)"/, m); print m[1]; exit}}' Cargo.toml)"
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          # [package] セクション内の version 行だけを書き換える（依存の version 行は不変）
          awk -v next="$NEXT" '
            /^\[package\]/ { in_pkg=1 }
            /^\[/ && !/^\[package\]/ { in_pkg=0 }
            in_pkg && /^version[[:space:]]*=/ && !done { sub(/"[^"]*"/, "\"" next "\""); done=1 }
            { print }
          ' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version

      - name: Update Cargo.lock
        # fv パッケージのエントリだけ更新する（他の依存は触らない）
        run: cargo update -p fv

      - name: Commit and push
        env:
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${NEXT}"
          if [ -n "$BUMP_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${BUMP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:main
          else
            echo "::warning::BUMP_TOKEN is not set. Push skipped — release.yml will not be triggered."
            echo "Set a fine-grained PAT (Contents=R/W on this repo) as the BUMP_TOKEN secret, then re-run."
          fi
